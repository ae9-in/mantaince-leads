version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: leadsbase-mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-setup:
    image: mongo:7.0
    container_name: leadsbase-mongodb-setup
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: [ "mongosh", "--host", "mongodb:27017", "--eval", "try { rs.status() } catch (err) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]}) }" ]

  redis:
    image: redis:7.0
    container_name: leadsbase-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
